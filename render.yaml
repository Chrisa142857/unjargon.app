# Render Blueprint: the unjargon backend as a free Docker web service.
# (Hugging Face marked the Docker SDK as paid for new Spaces, so Render's
# card-free tier is the free backend path; the same image works on both.)
#
# Blueprint deploy (after creating unjargon-db):
# https://render.com/deploy?repo=https://github.com/Chrisa142857/unjargon.app
#
# Free-tier behavior: sleeps after ~15 min idle (first request wakes it,
# ~1 min cold start). Production data needs a managed Postgres choice from the
# owner. The DATABASE_URL reference below requires an existing `unjargon-db`;
# it is intentionally not declared here so a Blueprint sync cannot silently
# create an expiring free database or a billable one.
services:
  - type: web
    name: unjargon
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /live
    envVars:
      - key: PORT
        value: "7860"
      - key: DATABASE_URL
        fromDatabase:
          name: unjargon-db
          property: connectionString
      # Optional overrides (set in the dashboard when wanted):
      # GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, AUTH_SECRET, APP_URL=https://unjargon.onrender.com
      # ANTHROPIC_API_KEY      — optional, only for explanation buttons
      # UNJARGON_FAKE_TRANSLATOR=1 — canned on-demand explanation demo mode
      # Create unjargon-db in Oregon, choose its plan, then sync this Blueprint.
