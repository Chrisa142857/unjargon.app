# Fetch a URL from a GitHub runner and print it to the job log — the dev
# sandbox's network policy blocks many hosts (devpost, cloudflare docs, ...);
# runners have open egress. Lives on the working branch only, on purpose:
# pushing to main would trigger production redeploys for a doc fetch.
name: Fetch URL
on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to fetch
        required: true
        type: string
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch
        env:
          URL: ${{ inputs.url }}
        run: |
          echo "=== BEGIN $URL ==="
          curl -sSL --max-time 60 -H "User-Agent: Mozilla/5.0" "$URL"
          echo
          echo "=== END ==="
