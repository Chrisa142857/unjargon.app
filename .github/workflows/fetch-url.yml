# Fetch a URL from a GitHub runner and print it to the job log — the dev
# sandbox's network policy blocks many hosts (devpost, cloudflare docs, ...);
# runners have open egress. Branch-only on purpose: main pushes trigger
# production deploys. Runs on pushes that touch this file; edit URL, push.
name: Fetch URL
on:
  push:
    branches: [claude/unjargon-hackathon-setup-2e2fya]
    paths: [".github/workflows/fetch-url.yml"]
jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      URL: https://developers.cloudflare.com/agent-setup/prompt.md
    steps:
      - name: Fetch
        run: |
          echo "=== BEGIN $URL ==="
          curl -sSL --max-time 60 -H "User-Agent: Mozilla/5.0" "$URL"
          echo
          echo "=== END ==="
