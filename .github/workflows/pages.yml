# Deploys the static frontend to GitHub Pages on every push to main.
#
# One-time repo setup:
#   1. Settings → Pages → Source: "GitHub Actions"
#   2. Settings → Secrets and variables → Actions → Variables →
#      new repository variable UNJARGON_API_BASE = https://unjargon.onrender.com
#      (the Render backend that runs the API; see DEPLOY.md)
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Creates the Pages site on first run when the token permits; if this
      # errors, enable once manually: Settings → Pages → Source: GitHub Actions.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      # Backend URL priority: explicit UNJARGON_API_BASE variable, else derived
      # from the optional HF_SPACE variable, else the managed Render backend.
      - name: Resolve API base
        id: apibase
        env:
          EXPLICIT: ${{ vars.UNJARGON_API_BASE }}
          SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -n "$EXPLICIT" ]; then
            echo "base=$EXPLICIT" >> "$GITHUB_OUTPUT"
          elif [ -n "$SPACE" ]; then
            sub=$(echo "$SPACE" | tr '[:upper:]' '[:lower:]' | tr '/_.' '---')
            echo "base=https://${sub}.hf.space" >> "$GITHUB_OUTPUT"
          else
            # the deployed Render service (repo variables above override this)
            echo "base=https://unjargon.onrender.com" >> "$GITHUB_OUTPUT"
          fi
      - name: Build static export
        working-directory: web
        env:
          NEXT_PUBLIC_API_BASE: ${{ steps.apibase.outputs.base }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: sh scripts/build-pages.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
