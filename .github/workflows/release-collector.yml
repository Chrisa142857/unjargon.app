name: Release collector

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example, v0.1.0)
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    name: Test collector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go test ./...
        working-directory: collector

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build static collector
        working-directory: collector
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o ../dist/unjargond-${GOOS}-${GOARCH} ./cmd/unjargond
      - uses: actions/upload-artifact@v4
        with:
          name: unjargond-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/unjargond-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release create "$TAG" dist/* --title "$TAG" --generate-notes
