# On-demand wiring probe of the deployed pair, run from GitHub's runners
# (the dev sandbox can't reach onrender.com or github.io directly). Checks
# that every feature endpoint exists on the Render backend with the expected
# auth behavior, that the deployed code is current (marker strings), and
# that the GitHub Pages frontend bundle carries the latest UI.
name: Check backend health
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe backend endpoints
        env:
          URL: ${{ vars.UNJARGON_API_BASE || 'https://unjargon.onrender.com' }}
        run: |
          echo "checking $URL"
          fail=0
          expect() { # expect <want-status> <method> <path> [data]
            want=$1; method=$2; path=$3; data=${4:-}
            if [ -n "$data" ]; then
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 -X "$method" -H 'Content-Type: application/json' -d "$data" "$URL$path") || code=000
            else
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 -X "$method" "$URL$path") || code=000
            fi
            if [ "$code" = "$want" ]; then echo "OK   $method $path → $code"; else echo "FAIL $method $path → $code (want $want)"; fail=1; fi
          }
          # wake a sleeping free instance first
          for i in $(seq 1 4); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$URL/live") || code=000
            echo "warmup $i: GET /live → $code"
            [ "$code" = "200" ] && break
            sleep 20
          done
          expect 200 GET  /live
          expect 401 GET  /api/bootstrap
          expect 401 GET  /api/wiki
          expect 401 GET  /api/stream
          expect 401 POST /api/ingest '{"device":"x","tool":"t","session_id":"s","messages":[]}'
          expect 401 GET  /api/work/expand
          expect 401 POST /api/work/expand/1 '{"text":"x"}'
          expect 401 POST /api/status '{"budget_used":0,"budget_limit":30}'
          expect 401 POST /api/terms/1/expand '{}'
          expect 401 GET  /api/terms/1/expand
          expect 401 GET  /api/terms/1/reference
          expect 401 POST /api/terms/1/learned
          expect 401 GET  /api/settings
          echo "--- OAuth start (needs GOOGLE_* env on Render) ---"
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$URL/api/auth/google") || code=000
          case "$code" in 30[127]) echo "OK   /api/auth/google redirects ($code)";; *) echo "WARN /api/auth/google → $code (check GOOGLE_CLIENT_ID/SECRET/AUTH_SECRET env)";; esac
          # No CORS by design: sign-in is a SameSite=Lax cookie, so the
          # authenticated app runs same-origin on the backend; the Pages
          # site is a landing page that links here and /live bounces here.
          exit $fail
      - name: Probe Pages frontend bundle
        run: |
          BASE=https://chrisa142857.github.io/unjargon.app
          fail=0
          for i in $(seq 1 4); do
            code=$(curl -sL -o /dev/null -w '%{http_code}' --max-time 20 "$BASE/live/") || code=000
            echo "attempt $i: GET /live/ → $code"
            [ "$code" = "200" ] && break
            sleep 15
          done
          [ "$code" = "200" ] || { echo "FAIL pages /live not served"; exit 1; }
          # landing page must send sign-in to the backend (same-origin auth)
          curl -s --max-time 15 "$BASE/" | grep -q 'unjargon.onrender.com/api/auth/google' \
            && echo "OK   landing links sign-in to the backend" \
            || { echo "FAIL landing missing backend sign-in link"; fail=1; }
          # collect the page's JS chunks and grep for current-feature markers
          curl -s --max-time 15 "$BASE/live/" -o live.html
          grep -oE '/unjargon\.app/_next/static/[^"]+\.js' live.html | sort -u > chunks.txt
          echo "$(wc -l < chunks.txt) chunks referenced"
          : > bundle.js
          while read -r c; do curl -s --max-time 20 "https://chrisa142857.github.io$c" >> bundle.js; done < chunks.txt
          for marker in 'Basic reference' 'Search Google' 'explain in my sessions' 'Finding jargon in your history'; do
            if grep -q "$marker" bundle.js live.html; then echo "OK   frontend has: $marker"; else echo "FAIL frontend missing: $marker (stale Pages build?)"; fail=1; fi
          done
          exit $fail
